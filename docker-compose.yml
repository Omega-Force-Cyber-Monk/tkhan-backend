services:
  postgres:
    image: postgres:16-alpine
    container_name: tkhan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tkhan_server
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
